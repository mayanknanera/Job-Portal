{% extends "base.html" %}
{% load i18n %}

{% block title %}Password Reset Complete - CareerPlus{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4" style="background:#0a0814;">
    <!-- Floating orbs -->
    <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] rounded-full pointer-events-none"
         style="background:radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%); filter:blur(40px);"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] rounded-full pointer-events-none"
         style="background:radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%); filter:blur(40px);"></div>

    <div class="w-full max-w-md glass-card rounded-2xl p-8 md:p-10 text-center relative animate-slide-up">
        <!-- Icon -->
        <div class="w-20 h-20 mx-auto mb-6 rounded-xl flex items-center justify-center relative"
             style="background:linear-gradient(135deg, rgba(16,185,129,0.2), rgba(6,182,212,0.15)); border:1px solid rgba(255,255,255,0.1);">
            <div class="absolute inset-0 bg-green-500/20 rounded-xl animate-pulse"></div>
            <svg class="w-10 h-10 text-green-400 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>

        <!-- Content -->
        <div class="mb-8">
            <span class="badge badge-green mb-4 inline-flex">Success</span>
            <h2 class="font-heading text-2xl sm:text-3xl font-extrabold text-white mb-3">
                Password <span class="text-gradient">Updated</span>
            </h2>

            <p class="text-ink-400 leading-relaxed text-sm">
                Your password has been successfully reset. You can now log in with your new password.
            </p>
        </div>

        <!-- Action -->
        <a href="{% url 'login' %}" class="btn-primary w-full py-3 text-sm">
            Continue to Login
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
        </a>
    </div>
</div>
{% endblock %}
