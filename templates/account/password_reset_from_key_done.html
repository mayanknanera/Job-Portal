{% extends "base.html" %}
{% load i18n %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
    <div
        class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-10 shadow-2xl text-center relative overflow-hidden">

        <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-500/10 blur-3xl rounded-full"></div>

        <div
            class="w-20 h-20 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-8 ring-1 ring-emerald-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h2 class="text-3xl font-bold text-white mb-4 tracking-tight">
            Password Updated
        </h2>

        <p class="text-slate-400 leading-relaxed mb-8">
            Your password has been successfully changed. You can now use your new password to sign in.
        </p>

        <a href="{% url 'login' %}"
            class="block w-full bg-cyan-600 hover:bg-cyan-500 text-white py-4 rounded-2xl font-bold transition duration-200 shadow-lg shadow-cyan-900/20">
            Log In Now
        </a>

    </div>
</div>
{% endblock %}
