<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CareerPlus{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0814;
            color: #e2dff0;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(147,51,234,0.1) 0%, rgba(6,182,212,0.1) 100%);
        }
        .email-header {
            background: linear-gradient(135deg, #9333ea, #06b6d4);
            padding: 30px 20px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin: 0;
        }
        .email-body {
            padding: 40px 30px;
            background: rgba(255,255,255,0.02);
        }
        .email-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 30px;
        }
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-top: 0;
        }
        p {
            line-height: 1.6;
            color: #b5b0c8;
            margin: 15px 0;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, #9333ea, #06b6d4);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 20px 0;
        }
        .info-box {
            background: rgba(147,51,234,0.1);
            border-left: 4px solid #9333ea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #756797;
            font-size: 14px;
        }
        .footer a {
            color: #22d3ee;
            text-decoration: none;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 25px 0;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1 class="logo">Career<span style="background: linear-gradient(135deg, #22d3ee, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Plus</span></h1>
        </div>
        
        <div class="email-body">
            <div class="email-content">
                {% block content %}{% endblock %}
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 CareerPlus. All rights reserved.</p>
            <p>
                <a href="{{ site_url }}">Visit Website</a> | 
                <a href="{{ site_url }}/jobs/">Browse Jobs</a>
            </p>
            <p style="font-size: 12px; margin-top: 15px;">
                You're receiving this email because you have an account with CareerPlus.
            </p>
        </div>
    </div>
</body>
</html>
