{% extends "base.html" %}

{% block title %}Login - Career Plus{% endblock %}

{% block breadcrumb %}
<div class="breadcrumb">
    <ul>
        <li><a href="{% url 'job_list' %}">Home</a></li>
        <li class="current">Login</li>
    </ul>
</div>
{% endblock %}

{% block content %}
<h1>Welcome Back</h1>

<div class="max-w-md mx-auto pt-10">
    <div class="bg-white p-10 rounded-3xl border border-slate-200 shadow-sm">
        {% comment %} <div class="text-center mb-8">
            <h2 style="color: #1e293b; font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem;">Sign In</h2>
        </div> {% endcomment %}

        <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
            {% csrf_token %}
            <div class="form-container">
                {{ form.as_p }}
            </div>
            <button type="submit" style="width: 100%; background-color: #3b82f6; color: white; padding: 0.75rem; border: none; border-radius: 0.375rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s;">
                Sign In
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 2rem;">
            <p style="color: #64748b; font-size: 0.875rem;">
                Don't have an account? <a href="{% url 'signup' %}" style="color: #3b82f6; text-decoration: none; font-weight: 600;">Sign up here</a>
            </p>
        </div>
    </div>
</div>

<style>
    .form-container p { margin-bottom: 1rem; }
    .form-container label { display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem; }
    .form-container input { width: 100%; border: 1px solid #e2e8f0; border-radius: 0.375rem; padding: 0.625rem 1rem; background: #f8fafc; font-size: 1rem; }
    .form-container input:focus { outline: none; border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
</style>
{% endblock %}
