{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="glass p-12 rounded-3xl text-center max-w-2xl w-full">
        <h1 class="text-4xl font-bold text-white mb-8 font-outfit">Choose your Role</h1>
        <p class="text-slate-400 mb-12 text-lg">How do you want to use Career Plus?</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Job Seeker Option -->
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="role" value="JOB_SEEKER">
                <button class="w-full p-8 rounded-2xl bg-slate-800/50 hover:bg-cyan-500/10 border border-slate-700 hover:border-cyan-400 group transition-all duration-300">
                    <div class="text-cyan-400 mb-4">
                        <svg class="w-12 h-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    </div>
                    <h3 class="text-xl font-bold text-white group-hover:text-cyan-400 mb-2">Job Seeker</h3>
                    <p class="text-sm text-slate-400">I'm looking for a job</p>
                </button>
            </form>

            <!-- Employer Option -->
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="role" value="EMPLOYER">
                <button class="w-full p-8 rounded-2xl bg-slate-800/50 hover:bg-blue-500/10 border border-slate-700 hover:border-blue-400 group transition-all duration-300">
                    <div class="text-blue-400 mb-4">
                        <svg class="w-12 h-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    </div>
                    <h3 class="text-xl font-bold text-white group-hover:text-blue-400 mb-2">Employer</h3>
                    <p class="text-sm text-slate-400">I want to hire talent</p>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
